apiVersion: conduit.mnke.org/v1alpha1
kind: Exchange
metadata:
  name: example-exchange
  labels:
    app.kubernetes.io/name: conduit
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # Optional: Enable archival by external systems
    archival.conduit.mnke.org/enabled: "true"
    archival.conduit.mnke.org/destination: "s3://my-bucket/exchanges/"
    archival.conduit.mnke.org/format: "jsonl"
    archival.conduit.mnke.org/on-completion: "true"
spec:
  # Pod template - follows the same structure as Kubernetes Job, Deployment, etc.
  # The controller will inject NATS connection info and manage the pod lifecycle
  template:
    metadata:
      labels:
        app: example-exchange
    spec:
      containers:
        - name: exchange
          image: "conduit/examples/echo:go"
          imagePullPolicy: IfNotPresent

          # Resource requirements
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # Environment variables for your application
          env:
            - name: APP_CONFIG
              value: "production"
            - name: LOG_LEVEL
              value: "info"

      # All standard Kubernetes pod configuration is supported:
      # - volumes and volumeMounts
      # - initContainers
      # - securityContext
      # - nodeSelector, affinity, tolerations
      # - serviceAccountName
      # - dnsPolicy, dnsConfig
      # - hostNetwork, hostPID, hostIPC
      # - terminationGracePeriodSeconds
      # - and more...

  # NATS stream configuration
  stream:
    retention:
      maxAge: "168h"  # 7 days
      maxMessages: 100000
      maxBytes: "1Gi"

  # Recovery configuration
  recovery:
    maxRestarts: 5
    backoffLimit: 3
